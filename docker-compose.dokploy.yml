name: provisioning-agent

services:
  provisioning-agent:
    build: .
    init: true
    restart: unless-stopped
    deploy:
      replicas: 1
      labels: []
      placement: {}
      restart_policy:
        condition: any
      endpoint_mode: vip
    # Production values come from Dokploy (or the host env at deploy time), not from a repo .env file.
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: "8080"
      PROVISIONING_API_TOKEN: ${PROVISIONING_API_TOKEN}
      ERP_REMOTE_BASE_URL: ${ERP_REMOTE_BASE_URL}
      ERP_REMOTE_TOKEN: ${ERP_REMOTE_TOKEN}
      ERP_REMOTE_TIMEOUT_MS: ${ERP_REMOTE_TIMEOUT_MS}
      ERP_BASE_DOMAIN: ${ERP_BASE_DOMAIN}
      ERP_API_USERNAME_PREFIX: ${ERP_API_USERNAME_PREFIX}
    expose:
      - "8080"
    networks:
      - dokploy-network
      - erp-execution

networks:
  dokploy-network:
    external: true
  erp-execution:
    external: true
    name: axiserp-erpexecutionservice-gesc16_default
