# Local / non-Dokploy development. The external `erp-execution` network must exist on the host
# (created by the erp-execution-service stack).
#
#   docker compose up -d --build

services:
  provisioning-agent:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - .env
    networks:
      - default
      - erp-execution
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.PORT||'8080')+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  erp-execution:
    external: true
    name: axiserp-erpexecutionservice-gesc16_default
