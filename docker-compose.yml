# Provisioning agent (Phase 1): join the same user-defined network as control-plane.
#
# Create the shared network once (if control-plane does not already create it):
#   docker network create control-plane
#
# Then:
#   docker compose up -d --build

services:
  provisioning-agent:
    build: .
    container_name: provisioning-agent
    hostname: provisioning-agent
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - .env
    networks:
      - control-plane
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.PORT||'8080')+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  control-plane:
    external: true
    name: control-plane
